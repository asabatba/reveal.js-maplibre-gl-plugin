<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reveal.js · MapLibre GL plugin demo</title>

  <!-- Reveal.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@6/dist/reveal.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@6/dist/theme/black.css" />

  <style>
    /* Let map slides fill the full viewport */
    .reveal .slides section[data-maplibre] {
      padding: 0;
    }

    .reveal .slides section[data-maplibre]>.slide-background.stretch {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Overlay slide content on top of the map */
    .reveal .slides section[data-maplibre] .content {
      position: relative;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      display: inline-block;
      padding: 0.6em 1.2em;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="reveal">
    <div class="slides">

      <!-- Plain intro slide (no map) -->
      <section>
        <h1>MapLibre GL</h1>
        <h3>reveal.js plugin demo</h3>
        <p>Use arrow keys or swipe to navigate</p>
      </section>

      <!-- slide mode (default): map fills the slide box -->
      <section data-maplibre='{"center":[2.1734,41.3851],"zoom":11,"pitch":0}'>
        <div class="content">
          <h2>Barcelona</h2>
          <p>slide mode · zoom 11</p>
        </div>
      </section>

      <!-- slide mode with fragment camera moves -->
      <section data-maplibre='{"center":[2.1734,41.3851],"zoom":13,"pitch":45,"bearing":-20}'>
        <div class="content">
          <h2>Fragments move the camera</h2>

          <p class="fragment" data-maplibre-to='{"center":[2.1769,41.4036],"zoom":15,"pitch":60}'>
            → Park Güell
          </p>

          <p class="fragment" data-maplibre-to='{"center":[2.1527,41.3791],"zoom":15,"pitch":45}'>
            → Camp Nou
          </p>
        </div>
      </section>

      <!-- Outro -->
      <section>
        <h2>Done</h2>
        <p>
          Plugin source:
          <a href="https://github.com/" target="_blank">GitHub</a>
        </p>
      </section>

    </div>
  </div>

  <!-- Reveal.js core -->
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>

  <!-- Plugin (loaded via Vite dev server from src/) -->
  <script type="module">
    import createMaplibrePlugin from './src/maplibre-gl.ts';

    Reveal.initialize({
      hash: true,
      // Plugin options – override the default style here if needed.
      // maplibre: { style: 'https://...' },
      plugins: [createMaplibrePlugin()],
    });
  </script>
</body>

</html>
